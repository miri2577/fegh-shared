name: fegh_pdf_kit
description: Gemeinsames PDF-Toolkit fuer FEGH-Apps. Design-Tokens, Font-Cache, Layout-Bausteine (Header, Footer, Hero, KPI-Reihe, Unterschriften, Tabellen, Balken, Leerzustand) und generischer Preview-Screen.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  pdf: ^3.11.1
  printing: ^5.13.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^3.0.0
